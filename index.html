<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Mr.Wang · 布局工程师</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #f8fafc;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(59, 130, 246, 0.03) 0%, transparent 35%),
                radial-gradient(circle at 90% 75%, rgba(99, 102, 241, 0.04) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(168, 85, 247, 0.02) 0%, transparent 50%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            color: #1e293b;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(148, 163, 184, 0.06) 1px, transparent 1px),
                linear-gradient(90deg, rgba(148, 163, 184, 0.06) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 0;
        }

        .main-card {
            position: relative;
            z-index: 10;
            max-width: 960px;
            width: 100%;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            background: linear-gradient(135deg, rgba(255,255,255,0.88) 0%, rgba(255,255,255,0.72) 100%);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 
                0 20px 40px -12px rgba(0, 0, 0, 0.06),
                0 4px 16px rgba(0, 0, 0, 0.02),
                inset 0 0 0 1px rgba(255,255,255,0.5);
            border-radius: 2.5rem;
            padding: 3rem 3rem 2.5rem;
            display: flex;
            flex-direction: column;
            gap: 2.5rem;
            transition: box-shadow 0.3s ease;
        }

        .main-card:hover {
            box-shadow: 0 25px 50px -15px rgba(0, 0, 0, 0.1), 0 0 0 1px rgba(99,102,241,0.15);
        }

        @media (max-width: 700px) {
            .main-card {
                padding: 2rem 1.5rem;
                border-radius: 2rem;
            }
            body {
                padding: 1rem;
            }
        }

        /* 头部 */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1.2rem;
        }

        .profile-area {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        /* 卡通男生头像（SVG风格） */
        .cartoon-avatar {
            width: 60px;
            height: 60px;
            background: #fef9c3;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: 0 8px 16px -6px rgba(0,0,0,0.08);
            border: 2px solid white;
            transition: all 0.3s ease;
            overflow: hidden;
        }

        .cartoon-avatar:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 22px -8px rgba(79,70,229,0.2);
        }

        .cartoon-avatar svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        .name-tag h2 {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 600;
            font-size: 1.9rem;
            letter-spacing: -0.5px;
            color: #0f172a;
            margin-bottom: 0.2rem;
        }

        .role {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #475569;
            font-weight: 500;
            font-size: 0.95rem;
            letter-spacing: 0.3px;
        }

        .role i {
            color: #6366f1;
            font-size: 0.8rem;
        }

        .status-badge {
            background: #f1f5f9;
            color: #334155;
            padding: 0.25rem 1rem;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
            border: 1px solid #e2e8f0;
            margin-left: 0.5rem;
            transition: all 0.2s ease;
        }

        .status-badge:hover {
            background: #eef2ff;
            border-color: #6366f1;
            color: #4f46e5;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
        }

        .nav-links a {
            text-decoration: none;
            color: #475569;
            font-weight: 500;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.3rem 0;
            border-bottom: 2px solid transparent;
        }

        .nav-links a:hover {
            color: #4f46e5;
            border-bottom-color: #4f46e5;
            transform: translateY(-1px);
        }

        /* 内容网格 */
        .content-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2.5rem;
            align-items: start;
        }

        @media (max-width: 700px) {
            .content-grid {
                grid-template-columns: 1fr;
            }
        }

        .intro-section h3 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2rem;
            font-weight: 600;
            line-height: 1.3;
            color: #0f172a;
            letter-spacing: -0.5px;
            transition: transform 0.2s ease;
        }

        .intro-section h3:hover {
            transform: translateX(4px);
        }

        .highlight {
            background: linear-gradient(to right, #6366f1, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
        }

        .bio {
            color: #475569;
            font-size: 1rem;
            line-height: 1.7;
            margin: 1.2rem 0 1.8rem;
            transition: color 0.2s;
        }

        .board-experience {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin-bottom: 2rem;
        }

        .board-chip {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 2.5rem;
            padding: 0.5rem 1.3rem;
            font-size: 0.9rem;
            font-weight: 500;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
            transition: all 0.25s ease;
            cursor: default;
        }

        .board-chip i {
            color: #6366f1;
            transition: transform 0.2s;
        }

        .board-chip:hover {
            border-color: #6366f1;
            box-shadow: 0 12px 22px -10px rgba(99,102,241,0.25);
            transform: translateY(-3px);
            background: #fafaff;
        }

        .board-chip:hover i {
            transform: scale(1.2);
        }

        .counter-row {
            display: flex;
            gap: 2rem;
            margin-top: 0.5rem;
        }

        .counter-item {
            display: flex;
            flex-direction: column;
            transition: transform 0.2s ease;
        }

        .counter-item:hover {
            transform: translateY(-3px);
        }

        .counter-number {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2rem;
            font-weight: 600;
            color: #0f172a;
            transition: color 0.2s;
        }

        .counter-item:hover .counter-number {
            color: #4f46e5;
        }

        .counter-label {
            font-size: 0.8rem;
            color: #64748b;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        /* 右侧项目卡片 */
        .project-card {
            background: #ffffff;
            border: 1px solid #f1f5f9;
            border-radius: 2rem;
            padding: 1.8rem 1.8rem 2rem;
            box-shadow: 0 15px 30px -12px rgba(0,0,0,0.04);
            transition: all 0.3s ease;
        }

        .project-card:hover {
            box-shadow: 0 25px 40px -14px rgba(0,0,0,0.1);
            border-color: #e2e8f0;
            transform: translateY(-2px);
        }

        .project-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.9rem 0;
            border-bottom: 1px solid #f1f5f9;
            transition: all 0.2s ease;
        }

        .project-item:last-child {
            border-bottom: none;
        }

        .project-item:hover {
            background: #fafbff;
            border-radius: 12px;
            padding-left: 0.8rem;
            padding-right: 0.8rem;
            margin-left: -0.8rem;
            margin-right: -0.8rem;
        }

        .project-name {
            font-weight: 600;
            color: #0f172a;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .project-desc {
            font-size: 0.8rem;
            color: #64748b;
            font-weight: 500;
        }

        .tech-tag {
            font-size: 0.7rem;
            background: #f1f5f9;
            padding: 0.2rem 0.7rem;
            border-radius: 20px;
            color: #334155;
            font-weight: 600;
            transition: all 0.2s;
        }

        .project-item:hover .tech-tag {
            background: #e0e7ff;
            color: #4f46e5;
        }

        .view-more {
            margin-top: 1.2rem;
            color: #6366f1;
            font-size: 0.85rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.3rem;
            transition: gap 0.2s;
            cursor: pointer;
        }

        .view-more:hover {
            gap: 0.6rem;
            color: #4f46e5;
        }

        /* 底部 */
        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1.5rem;
            margin-top: 0.5rem;
        }

        .contact-icons {
            display: flex;
            gap: 1.8rem;
            font-size: 1.4rem;
        }

        .contact-icons a {
            color: #64748b;
            transition: all 0.25s ease;
            display: inline-block;
        }

        .contact-icons a:hover {
            color: #4f46e5;
            transform: translateY(-3px) scale(1.1);
        }

        .btn-outline {
            border: 1.5px solid #e2e8f0;
            background: white;
            padding: 0.7rem 1.8rem;
            border-radius: 3rem;
            font-weight: 600;
            color: #1e293b;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.25s ease;
            font-size: 0.9rem;
        }

        .btn-outline:hover {
            border-color: #6366f1;
            background: #f8faff;
            box-shadow: 0 10px 20px -8px rgba(79,70,229,0.3);
            color: #4f46e5;
            transform: translateY(-2px);
        }

        .btn-solid {
            background: #0f172a;
            color: white;
            border: none;
            padding: 0.7rem 2rem;
            border-radius: 3rem;
            font-weight: 600;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.25s ease;
            font-size: 0.9rem;
        }

        .btn-solid:hover {
            background: #1e293b;
            box-shadow: 0 14px 24px -10px rgba(15,23,42,0.45);
            transform: translateY(-2px);
        }

        .quote-text {
            font-size: 0.75rem;
            color: #94a3b8;
            text-align: right;
            letter-spacing: 0.5px;
            margin-top: 0.3rem;
            transition: color 0.2s;
        }

        .quote-text:hover {
            color: #6366f1;
        }
    </style>
</head>
<body>
    <div class="main-card">
        <!-- 头部 -->
        <div class="header">
            <div class="profile-area">
                <!-- 卡通男生头像 SVG -->
                <div class="cartoon-avatar">
                    <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <!-- 脸 -->
                        <circle cx="50" cy="55" r="38" fill="#FDDCB5" stroke="#E5C4A0" stroke-width="1.5"/>
                        <!-- 头发 -->
                        <path d="M18 58C18 35 35 18 50 18C65 18 82 35 82 58C82 56 78 50 74 47C70 44 64 43 60 44C56 45 54 48 50 48C46 48 44 45 40 44C36 43 30 44 26 47C22 50 18 56 18 58Z" fill="#2C1E16"/>
                        <!-- 眼睛 -->
                        <circle cx="38" cy="52" r="4" fill="#1E1E1E"/>
                        <circle cx="62" cy="52" r="4" fill="#1E1E1E"/>
                        <circle cx="39.5" cy="50.5" r="1.2" fill="white"/>
                        <circle cx="63.5" cy="50.5" r="1.2" fill="white"/>
                        <!-- 眉毛 -->
                        <path d="M32 46 Q38 43 44 47" stroke="#2C1E16" stroke-width="2" fill="none"/>
                        <path d="M56 47 Q62 43 68 46" stroke="#2C1E16" stroke-width="2" fill="none"/>
                        <!-- 微笑 -->
                        <path d="M42 65 Q50 72 58 65" stroke="#D4756B" stroke-width="2.2" fill="none" stroke-linecap="round"/>
                        <!-- 腮红 -->
                        <ellipse cx="32" cy="60" rx="5" ry="3" fill="#FFB6B6" opacity="0.5"/>
                        <ellipse cx="68" cy="60" rx="5" ry="3" fill="#FFB6B6" opacity="0.5"/>
                    </svg>
                </div>
                <div class="name-tag">
                    <h2>Mr.Wang</h2>
                    <div class="role">
                        <i class="fas fa-route"></i> 初级布局工程师 <span class="status-badge">开放机会</span>
                    </div>
                </div>
            </div>
            <div class="nav-links">
                <a href="#"><i class="far fa-user"></i> 关于</a>
                <a href="#"><i class="far fa-folder-open"></i> 项目</a>
                <a href="#"><i class="far fa-paper-plane"></i> 联系</a>
            </div>
        </div>

        <!-- 核心内容 -->
        <div class="content-grid">
            <div class="intro-section">
                <h3>
                    从<span class="highlight">射频</span>到<span class="highlight">DDR</span><br>构建可靠电路
                </h3>
                <p class="bio">
                    电子工程背景，专注于PCB布局设计。已完成3块板子的全流程设计，
                    涵盖射频前端与DDR存储接口。追求信号完整性与可制造性的平衡，
                    持续学习高速数字设计。
                </p>
                <div class="board-experience">
                    <div class="board-chip"><i class="fas fa-broadcast-tower"></i> 射频收发板</div>
                    <div class="board-chip"><i class="fas fa-memory"></i> DDR4 接口板</div>
                    <div class="board-chip"><i class="fas fa-wave-square"></i> 射频功放板</div>
                </div>
                <div class="counter-row">
                    <div class="counter-item">
                        <span class="counter-number">3</span>
                        <span class="counter-label">完成项目</span>
                    </div>
                    <div class="counter-item">
                        <span class="counter-number">2</span>
                        <span class="counter-label">技术领域</span>
                    </div>
                    <div class="counter-item">
                        <span class="counter-number">1</span>
                        <span class="counter-label">年经验</span>
                    </div>
                </div>
            </div>

            <!-- 右侧项目卡片 -->
            <div class="project-card">
                <div style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1.2rem; font-weight: 600; color: #0f172a;">
                    <i class="fas fa-cube" style="color: #6366f1;"></i> 近期项目
                </div>
                <div class="project-item">
                    <div>
                        <div class="project-name"><i class="fas fa-broadcast-tower" style="font-size:0.8rem;"></i> 2.4GHz 射频前端</div>
                        <div class="project-desc">4层板 · 阻抗控制</div>
                    </div>
                    <span class="tech-tag">RF</span>
                </div>
                <div class="project-item">
                    <div>
                        <div class="project-name"><i class="fas fa-memory"></i> DDR4 控制器板</div>
                        <div class="project-desc">6层板 · 等长布线</div>
                    </div>
                    <span class="tech-tag">DDR</span>
                </div>
                <div class="project-item">
                    <div>
                        <div class="project-name"><i class="fas fa-wave-square"></i> 射频功率放大器</div>
                        <div class="project-desc">2层板 · 热管理</div>
                    </div>
                    <span class="tech-tag">PA</span>
                </div>
                <div class="view-more">
                    <i class="fas fa-arrow-right"></i> 查看完整版图
                </div>
            </div>
        </div>

        <!-- 底部 -->
        <div class="footer">
            <div class="contact-icons">
                <a href="#"><i class="fab fa-github"></i></a>
                <a href="#"><i class="fab fa-linkedin-in"></i></a>
                <a href="#"><i class="far fa-envelope"></i></a>
            </div>
            <div style="display: flex; gap: 0.8rem;">
                <a href="#" class="btn-outline"><i class="far fa-file-alt"></i> 简历</a>
                <a href="#" class="btn-solid"><i class="far fa-comment"></i> 联系我</a>
            </div>
        </div>
        <div class="quote-text">
            “每一根走线都是经验的积累”
        </div>
    </div>
</body>
</html>
